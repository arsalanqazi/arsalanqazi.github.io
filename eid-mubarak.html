<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1">
    <title>Eid Signal · Illuminate & Encode</title>
    <!-- Space Grotesk + Amiri + Cinzel for elegance -->
    <link
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Amiri:ital@0;1&family=Cinzel:wght@600;700&display=swap"
        rel="stylesheet">
    <style>
        :root {
            /* Core Colors */
            --bg-deep: #02040a;
            --bg-accent: #0a1128;
            --gold-primary: #e6c27a;
            --gold-glow: rgba(230, 194, 122, 0.6);
            --cyan-primary: #00e5ff;
            --cyan-glow: rgba(0, 229, 255, 0.5);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            background: radial-gradient(circle at 50% 100%, var(--bg-accent) 0%, var(--bg-deep) 100%);
            font-family: 'Space Grotesk', sans-serif;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            color: #ffffff;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .stars {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image:
                radial-gradient(1px 1px at 20px 30px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 140px 70px, rgba(255, 255, 255, 0.8), rgba(0, 0, 0, 0)),
                radial-gradient(2px 2px at 250px 160px, rgba(255, 255, 255, 0.6), rgba(0, 0, 0, 0)),
                radial-gradient(1px 1px at 90px 40px, #ffffff, rgba(0, 0, 0, 0)),
                radial-gradient(1.5px 1.5px at 300px 90px, rgba(255, 255, 255, 0.9), rgba(0, 0, 0, 0));
            background-repeat: repeat;
            background-size: 400px 400px;
            opacity: 0.3;
            animation: twinkling 6s infinite alternate;
            z-index: 0;
        }

        @keyframes twinkling {
            0% {
                opacity: 0.2;
                transform: translateY(0);
            }

            100% {
                opacity: 0.6;
                transform: translateY(-3px);
            }
        }

        /* Realistic Architectural Props Background */
        .bg-props {
            position: fixed;
            bottom: -5vh;
            /* Adjusted for larger, more imposing architecture */
            left: 0;
            width: 100%;
            height: 70%;
            z-index: 1;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: flex-end;
        }

        .mosque-svg {
            width: 100%;
            max-width: 1400px;
            height: auto;
            opacity: 0.3;
            filter: drop-shadow(0 -15px 30px rgba(0, 0, 0, 0.9));
            transition: all 2s cubic-bezier(0.25, 0.8, 0.25, 1);
            transform-origin: bottom center;
        }

        .mosque-svg path,
        .mosque-svg polygon,
        .mosque-svg rect {
            fill: #060a14;
            stroke: rgba(230, 194, 122, 0.05);
            stroke-width: 0.7;
            transition: all 2.5s ease;
        }

        /* Lanterns */
        .lantern-container {
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
            pointer-events: none;
        }

        .lantern-wrap {
            position: absolute;
            transform-origin: top center;
            animation: swing 5s infinite ease-in-out;
            opacity: 0;
            /* Hidden initially to make illumination pop more, or very dim */
            transition: opacity 2s, filter 2s;
        }

        .lantern-wrap::before {
            content: '';
            position: absolute;
            top: -200px;
            left: 50%;
            width: 1px;
            height: 200px;
            background: linear-gradient(to bottom, transparent, rgba(230, 194, 122, 0.15));
            transition: background 2s;
        }

        .lantern-wrap svg {
            width: 35px;
            height: 55px;
            fill: #060a14;
            stroke: rgba(230, 194, 122, 0.2);
            stroke-width: 1;
            transition: all 2s;
        }

        .l1 {
            top: 15%;
            left: 20%;
            animation-delay: 0s;
            width: 30px;
        }

        .l2 {
            top: 28%;
            right: 25%;
            animation-delay: 0.7s;
            width: 40px;
        }

        .l3 {
            top: 8%;
            left: 40%;
            animation-delay: 1.5s;
            width: 25px;
        }

        .l4 {
            top: 22%;
            right: 15%;
            animation-delay: 1.1s;
            width: 35px;
        }

        @keyframes swing {
            0% {
                transform: rotate(4deg);
            }

            50% {
                transform: rotate(-4deg);
            }

            100% {
                transform: rotate(4deg);
            }
        }

        /* Illuminated States */
        .mosque-svg.illuminated path,
        .mosque-svg.illuminated polygon,
        .mosque-svg.illuminated rect {
            fill: #0b1224;
            stroke: rgba(230, 194, 122, 0.8);
            /* Rich gold outlines outlining the architectural details */
            filter: drop-shadow(0 0 15px rgba(230, 194, 122, 0.3));
        }

        .lantern-wrap.illuminated {
            opacity: 1;
            filter: drop-shadow(0 0 25px var(--gold-primary));
        }

        .lantern-wrap.illuminated::before {
            background: linear-gradient(to bottom, transparent, rgba(230, 194, 122, 0.6));
        }

        .lantern-wrap.illuminated svg {
            fill: rgba(230, 194, 122, 0.15);
            stroke: var(--gold-primary);
        }

        /* Scan Wave */
        .scan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 100;
            opacity: 0;
            overflow: hidden;
        }

        .scan-wave {
            position: absolute;
            top: -30%;
            left: 0;
            width: 100%;
            height: 30%;
            background: linear-gradient(to bottom,
                    transparent,
                    rgba(0, 229, 255, 0.05),
                    rgba(0, 229, 255, 0.4),
                    rgba(0, 229, 255, 0.8),
                    rgba(0, 229, 255, 0.1),
                    transparent);
            box-shadow: 0 0 60px rgba(0, 229, 255, 0.2);
            filter: blur(8px);
        }

        .scanning-active {
            opacity: 1;
        }

        .scanning-active .scan-wave {
            animation: waveDown 3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes waveDown {
            0% {
                top: -30%;
            }

            100% {
                top: 120%;
            }
        }

        /* Interface Container */
        .interface-container {
            position: relative;
            z-index: 50;
            text-align: center;
            width: 100%;
            max-width: 900px;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .btn-tap {
            background: transparent;
            border: 1px solid var(--gold-primary);
            color: var(--gold-primary);
            font-family: 'Cinzel', serif;
            font-weight: 700;
            padding: 20px 60px;
            border-radius: 2px;
            font-size: 1.5rem;
            letter-spacing: 6px;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .btn-tap::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(230, 194, 122, 0.3), transparent);
            transition: all 0.6s ease;
        }

        .btn-tap:hover {
            background: rgba(230, 194, 122, 0.05);
            box-shadow: 0 0 30px rgba(230, 194, 122, 0.2), inset 0 0 20px rgba(230, 194, 122, 0.1);
            transform: scale(1.02);
            letter-spacing: 8px;
        }

        .btn-tap:hover::after {
            left: 100%;
        }

        .btn-tap.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        /* Status & Content */
        .step-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -40%);
            opacity: 0;
            transition: all 1.2s cubic-bezier(0.19, 1, 0.22, 1);
            width: 100%;
            pointer-events: none;
            padding: 0 1rem;
        }

        .step-content.active {
            opacity: 1;
            transform: translate(-50%, -50%);
        }

        .status-text {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: var(--cyan-primary);
            text-shadow: 0 0 15px var(--cyan-glow);
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        .moon-icon {
            width: 100px;
            height: 100px;
            box-shadow: inset -12px -12px 0 0 var(--gold-primary);
            border-radius: 50%;
            margin: 0 auto;
            filter: drop-shadow(0 0 20px var(--gold-glow));
        }

        /* Transcription Sequence */
        .duas-container {
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
            align-items: center;
            width: 100%;
            transition: transform 2.5s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .text-line {
            text-align: center;
            line-height: 1.8;
            margin: 0 auto;
        }

        .english {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 1.3rem;
            font-weight: 300;
            color: #e2f1f8;
            max-width: 800px;
            letter-spacing: 1px;
        }

        .arabic {
            font-family: 'Amiri', serif;
            font-size: 2.8rem;
            direction: rtl;
            color: var(--gold-primary);
            text-shadow: 0 0 15px rgba(230, 194, 122, 0.4);
            line-height: 1.6;
            max-width: 600px;
        }

        .dna-char {
            font-family: 'Courier New', Courier, monospace;
            color: var(--cyan-primary);
            text-shadow: 0 0 8px var(--cyan-glow);
            font-weight: 700;
            opacity: 0.8;
        }

        .duas-container.move-up {
            transform: translateY(-80px);
        }

        /* Final Landing */
        .finale-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, 50px);
            opacity: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: all 2s cubic-bezier(0.19, 1, 0.22, 1);
            pointer-events: none;
            width: 100%;
            padding: 0 1rem;
        }

        .finale-container.landed {
            opacity: 1;
            transform: translate(-50%, 90px);
            /* Lands gracefully below the raised Duas */
        }

        .final-headline {
            font-family: 'Cinzel', serif;
            font-size: 4.5rem;
            font-weight: 700;
            letter-spacing: 8px;
            background: linear-gradient(to bottom, #ffffff, var(--gold-primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 10px 25px rgba(230, 194, 122, 0.4));
            margin-bottom: 1.5rem;
            text-align: center;
            width: 100%;
        }

        .signature {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 300;
            font-size: 1.2rem;
            color: #a0b6d1;
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            /* Animated separately */
            transition: opacity 2s ease 1s;
            /* Delay to appear after Eid Mubarak lands */
            text-align: center;
        }

        .finale-container.landed .signature {
            opacity: 1;
        }

        /* ------------------------------------------- */
        /* RESPONSIVE DESIGN                           */
        /* ------------------------------------------- */

        @media (max-width: 1024px) {
            .final-headline {
                font-size: 3.5rem;
                letter-spacing: 6px;
            }

            .arabic {
                font-size: 2.2rem;
            }

            .english {
                font-size: 1.1rem;
                padding: 0 1rem;
            }
        }

        @media (max-width: 768px) {
            .btn-tap {
                padding: 15px 40px;
                font-size: 1.2rem;
                letter-spacing: 4px;
            }

            .status-text {
                font-size: 0.9rem;
                letter-spacing: 3px;
                margin-bottom: 2rem;
            }

            .moon-icon {
                width: 75px;
                height: 75px;
            }

            .duas-container {
                gap: 1.5rem;
            }

            .english {
                font-size: 1rem;
                line-height: 1.6;
            }

            .arabic {
                font-size: 1.8rem;
                line-height: 1.5;
                padding: 0 1rem;
            }

            .duas-container.move-up {
                transform: translateY(-65px);
            }

            .finale-container.landed {
                transform: translate(-50%, 75px);
            }

            .final-headline {
                font-size: 2.5rem;
                letter-spacing: 4px;
                margin-bottom: 1rem;
            }

            .signature {
                font-size: 0.95rem;
                letter-spacing: 2px;
            }

            /* Adjust lanterns for tablets */
            .l1 {
                left: 10%;
                width: 25px;
            }

            .l2 {
                right: 10%;
                width: 30px;
            }

            .l3 {
                left: 25%;
                width: 20px;
            }

            .l4 {
                right: 5%;
                width: 25px;
            }
        }

        @media (max-width: 480px) {
            .interface-container {
                padding: 1rem;
            }

            .btn-tap {
                padding: 12px 30px;
                font-size: 1.1rem;
                letter-spacing: 3px;
            }

            .status-text {
                font-size: 0.8rem;
                letter-spacing: 2px;
            }

            .moon-icon {
                width: 60px;
                height: 60px;
            }

            .english {
                font-size: 0.9rem;
            }

            .arabic {
                font-size: 1.5rem;
            }

            .duas-container.move-up {
                transform: translateY(-50px);
            }

            .finale-container.landed {
                transform: translate(-50%, 65px);
            }

            .final-headline {
                font-size: 1.8rem;
                letter-spacing: 2px;
            }

            .signature {
                font-size: 0.8rem;
                letter-spacing: 1px;
            }

            /* Adjust lanterns for mobile */
            .l1 {
                left: 5%;
                width: 20px;
            }

            .l2 {
                right: 5%;
                width: 25px;
            }

            .l3 {
                display: none;
            }

            /* Hide one lantern on very small screens to avoid clutter */
            .l4 {
                right: 15%;
                width: 20px;
            }

            /* Background alignment tweak for mobile */
            .bg-props {
                bottom: -2vh;
            }
        }
    </style>
</head>

<body>

    <div class="stars"></div>

    <!-- Realistic Intricate Mosque Background Skyline -->
    <div class="bg-props">
        <svg class="mosque-svg" id="mosqueSvg" viewBox="0 0 1600 500" preserveAspectRatio="xMidYMax slice">
            <!-- Layers of Depth - Background silhouettes -->
            <path d="M 200 400 L 200 250 L 230 200 L 260 250 L 260 400 Z" fill="#03050a" opacity="0.5" />
            <path d="M 1300 400 L 1300 220 L 1340 160 L 1380 220 L 1380 400 Z" fill="#03050a" opacity="0.5" />

            <!-- Main Central Grand Dome -->
            <path d="M 600 300 C 600 120, 700 80, 800 50 C 900 80, 1000 120, 1000 300 Z" />
            <!-- Central Dome Finial (Spire) -->
            <rect x="797" y="10" width="6" height="40" />
            <circle cx="800" cy="8" r="4" />
            <path d="M 790 0 A 10 10 0 0 0 800 -10 A 10 10 0 0 1 810 0 Z" fill="none" stroke="currentColor" />

            <!-- Flanking Secondary Domes -->
            <path d="M 450 320 C 450 200, 520 180, 580 160 C 580 250, 590 320, 600 320 Z" />
            <path d="M 1150 320 C 1150 200, 1080 180, 1020 160 C 1020 250, 1010 320, 1000 320 Z" />

            <rect x="512" y="130" width="4" height="30" />
            <rect x="1082" y="130" width="4" height="30" />

            <!-- Main Grand Minarets -->
            <!-- Left Minaret -->
            <rect x="350" y="80" width="30" height="420" />
            <!-- Balconies -->
            <rect x="340" y="150" width="50" height="10" rx="2" />
            <rect x="340" y="250" width="50" height="10" rx="2" />
            <!-- Top Spire -->
            <path d="M 350 80 L 365 20 L 380 80 Z" />
            <circle cx="365" cy="15" r="3" />

            <!-- Right Minaret -->
            <rect x="1220" y="80" width="30" height="420" />
            <!-- Balconies -->
            <rect x="1210" y="150" width="50" height="10" rx="2" />
            <rect x="1210" y="250" width="50" height="10" rx="2" />
            <!-- Top Spire -->
            <path d="M 1220 80 L 1235 20 L 1250 80 Z" />
            <circle cx="1235" cy="15" r="3" />

            <!-- Secondary Minarets -->
            <rect x="520" y="180" width="20" height="320" />
            <path d="M 520 180 L 530 140 L 540 180 Z" />

            <rect x="1060" y="180" width="20" height="320" />
            <path d="M 1060 180 L 1070 140 L 1080 180 Z" />

            <!-- Main Structure Base -->
            <rect x="100" y="320" width="1400" height="180" />

            <!-- Intricate Archways / Colonnade Series -->
            <!-- Left Wing -->
            <path d="M 150 500 L 150 380 C 150 340, 210 340, 210 380 L 210 500 Z" />
            <path d="M 230 500 L 230 380 C 230 340, 290 340, 290 380 L 290 500 Z" />
            <path d="M 310 500 L 310 400 C 310 370, 360 370, 360 400 L 360 500 Z" />
            <path d="M 400 500 L 400 380 C 400 340, 460 340, 460 380 L 460 500 Z" />

            <!-- Center Grand Entrance / Iwan -->
            <path d="M 650 500 L 650 350 C 650 250, 950 250, 950 350 L 950 500 Z" fill="#02040a" />
            <!-- Inner Arch detailing -->
            <path d="M 680 500 L 680 370 C 680 290, 920 290, 920 370 L 920 500 Z" fill="#040711" />
            <path d="M 720 500 L 720 400 C 720 340, 880 340, 880 400 L 880 500 Z" fill="#010205" />

            <!-- Right Wing -->
            <path d="M 1000 500 L 1000 380 C 1000 340, 1060 340, 1060 380 L 1060 500 Z" />
            <path d="M 1080 500 L 1080 400 C 1080 370, 1130 370, 1130 400 L 1130 500 Z" />
            <path d="M 1150 500 L 1150 380 C 1150 340, 1210 340, 1210 380 L 1210 500 Z" />
            <path d="M 1270 500 L 1270 380 C 1270 340, 1330 340, 1330 380 L 1330 500 Z" />
            <path d="M 1350 500 L 1350 380 C 1350 340, 1410 340, 1410 380 L 1410 500 Z" />
        </svg>
    </div>

    <!-- Hanging Lanterns - Elegant Morrocan Style -->
    <div class="lantern-container">
        <svg width="0" height="0">
            <defs>
                <g id="lantern-graphic">
                    <polygon points="12,0 18,10 18,30 14,40 10,40 6,30 6,10" />
                    <rect x="11" y="-5" width="2" height="5" />
                    <!-- Intricate fretwork lines -->
                    <path d="M 6 15 L 18 15 M 6 25 L 18 25 M 12 10 L 12 30" stroke-width="0.5" />
                    <circle cx="12" cy="20" r="2" />
                </g>
            </defs>
        </svg>
        <div class="lantern-wrap l1"><svg viewBox="0 0 24 40">
                <use href="#lantern-graphic" />
            </svg></div>
        <div class="lantern-wrap l2"><svg viewBox="0 0 24 40">
                <use href="#lantern-graphic" />
            </svg></div>
        <div class="lantern-wrap l3"><svg viewBox="0 0 24 40">
                <use href="#lantern-graphic" />
            </svg></div>
        <div class="lantern-wrap l4"><svg viewBox="0 0 24 40">
                <use href="#lantern-graphic" />
            </svg></div>
    </div>

    <!-- Scanner -->
    <div id="scanOverlay" class="scan-overlay">
        <div class="scan-wave"></div>
    </div>

    <!-- Main View Elements -->
    <div class="interface-container">

        <!-- Start Button -->
        <button id="tapBtn" class="btn-tap">Tap Tap</button>

        <!-- Phases Container -->
        <div id="stepContainer" class="step-content">
            <!-- Phase Views Injected Here -->
        </div>

        <!-- Finale Container for Name and Eid Mubarak -->
        <div id="finaleContainer" class="finale-container">
            <div class="final-headline">EID MUBARAK</div>
            <div class="signature">Arsalan Riaz</div>
        </div>

    </div>

    <script>
        const app = {
            tapBtn: document.getElementById('tapBtn'),
            container: document.getElementById('stepContainer'),
            finaleContainer: document.getElementById('finaleContainer'),
            mosque: document.getElementById('mosqueSvg'),
            lanterns: document.querySelectorAll('.lantern-wrap'),
            scanOverlay: document.getElementById('scanOverlay'),

            duaEnglish: "May Allah continue to shower His countless blessings upon us as He did during Ramadan, keep our hearts steadfast upon faith, and grant us the strength to lower our gaze from the distractions of the dunya. May He purify our intentions, accept our عبادات, forgive our shortcomings, and guard us against deception both from within ourselves and from the whispers around us. May He unite and uplift the entire Ummah of the Prophet ﷺ, granting us all success in this life and the Hereafter. Ameen.",
            duaArabic: "تقبل الله منا ومنكم صالح الاعمال وكل عيد وأنتم والجميع بخير",

            sleep: ms => new Promise(r => setTimeout(r, ms)),

            async start() {
                // Fade out and disable button
                this.tapBtn.classList.add('hidden');

                // 1. Sighting the Moon
                await this.phaseSighting();

                // 2. City Illumination
                await this.phaseLightCity();

                // 3. Genomic Transcription (English first, then Arabic)
                await this.phaseTranscription();
            },

            async phaseSighting() {
                this.container.innerHTML = `
                    <div class="status-text">Sighting the Moon</div>
                    <div class="moon-icon"></div>
                `;
                this.container.classList.add('active');

                this.scanOverlay.classList.add('scanning-active');
                // Give the scan 3 seconds to complete its sweep
                await this.sleep(3000);

                this.container.classList.remove('active');
                await this.sleep(1200); // Wait for fade out
            },

            async phaseLightCity() {
                // Initialize the city elements
                // No rounded rectangles, just text
                this.container.innerHTML = `<div class="status-text">Illuminating the City</div>`;
                this.container.classList.add('active');

                // Light up lanterns step-by-step to create dramatic effect
                for (let lantern of this.lanterns) {
                    lantern.classList.add('illuminated');
                    await this.sleep(500);
                }

                // Finally, illuminate the grand mosque silhouette
                this.mosque.classList.add('illuminated');
                await this.sleep(2000);

                this.container.classList.remove('active');
                await this.sleep(1200);
            },

            async phaseTranscription() {
                this.container.innerHTML = `
                    <div id="duasArea" class="duas-container">
                        <!-- English First -->
                        <div id="lineEnglish" class="text-line english"></div>
                        <!-- Arabic Second -->
                        <div id="lineArabic" class="text-line arabic"></div>
                    </div>
                `;
                this.container.classList.add('active');

                const lineEn = document.getElementById('lineEnglish');
                const lineAr = document.getElementById('lineArabic');
                const duasArea = document.getElementById('duasArea');

                // English ATCG Typewriter
                await this.typeWithDNA(lineEn, this.duaEnglish, 10);
                await this.sleep(800);

                // Arabic ATCG Typewriter
                await this.typeWithDNA(lineAr, this.duaArabic, 10);
                await this.sleep(1500);

                // Merge steps: Move Duas UP and bring in EID MUBARAK + Name from below.
                duasArea.classList.add('move-up');

                // Slight delay so the movement starts before the text lands
                await this.sleep(400);
                this.finaleContainer.classList.add('landed');
            },

            async typeWithDNA(element, text, baseSpeed) {
                const bases = ['AAA', 'AAT', 'AAG', 'AAC',
                    'ATA', 'ATT', 'ATG', 'ATC',
                    'AGA', 'AGT', 'AGG', 'AGC',
                    'ACA', 'ACT', 'ACG', 'ACC',

                    'TAA', 'TAT', 'TAG', 'TAC',
                    'TTA', 'TTT', 'TTG', 'TTC',
                    'TGA', 'TGT', 'TGG', 'TGC',
                    'TCA', 'TCT', 'TCG', 'TCC',

                    'GAA', 'GAT', 'GAG', 'GAC',
                    'GTA', 'GTT', 'GTG', 'GTC',
                    'GGA', 'GGT', 'GGG', 'GGC',
                    'GCA', 'GCT', 'GCG', 'GCC',

                    'CAA', 'CAT', 'CAG', 'CAC',
                    'CTA', 'CTT', 'CTG', 'CTC',
                    'CGA', 'CGT', 'CGG', 'CGC',
                    'CCA', 'CCT', 'CCG', 'CCC'
                ];
                let currentText = "";

                for (let i = 0; i < text.length; i++) {
                    const char = text[i];

                    if (char === " ") {
                        currentText += " ";
                        element.innerHTML = currentText;
                        continue;
                    }

                    // 1. Flash 3 to 5 DNA bases rapidly before locking the real character
                    const cycleCount = Math.floor(Math.random() * 3) + 3; // 3, 4, or 5 ATCGs
                    for (let c = 0; c < cycleCount; c++) {
                        const dna = bases[Math.floor(Math.random() * 64)];
                        // Render the current text plus the flickering DNA base
                        element.innerHTML = currentText + `<span class="dna-char">${dna}</span>`;
                        // Rapid flash speed
                        await this.sleep(baseSpeed * 0.5);
                    }

                    // 2. Lock in the real character
                    currentText += char;
                    element.innerHTML = currentText;

                    // Brief pause before moving to the next character for a typewriter cadence
                    await this.sleep(baseSpeed * 0.8);
                }
            }
        };

        app.tapBtn.addEventListener('click', () => {
            // Guard against multiple clicks
            if (!app.tapBtn.classList.contains('hidden')) {
                app.start();
            }
        });
    </script>
