<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eid Mubarak — Arsalan Riaz</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Noto+Naskh+Arabic:wght@400;700&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --ivory: #f5f0e8;
      --warm-white: #faf8f4;
      --ink: #1a1410;
      --terracotta: #c4622d;
      --saffron: #e8951a;
      --emerald: #1a6b4a;
      --lapis: #1e3a6e;
      --pale-gold: #d4a86a;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: var(--ivory);
      min-height: 100dvh;
      overflow-x: hidden;
      overflow-y: auto;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      color: var(--ink);
    }

    /* Paper Texture */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      opacity: 0.5;
      pointer-events: none;
      z-index: 10;
    }

    /* Cinematic Shamsa Wrapper */
    .shamsa-anchor {
      position: fixed;
      top: 50vh;
      right: 50vw;
      transform: translate(50%, -50%) scale(1);
      width: min(70vmin, 500px);
      height: min(70vmin, 500px);
      transition: all 1.8s cubic-bezier(0.4, 0, 0.2, 1);
      z-index: 100;
      pointer-events: none;
    }

    /* Corner State */
    .shamsa-anchor.in-corner {
      top: 2rem;
      right: 2rem;
      transform: translate(0, 0) scale(0.24);
      opacity: 0;
    }

    .geo-svg {
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .ink-line {
      fill: none;
      stroke: var(--ink);
      stroke-width: 0.8;
    }

    .ink-thin {
      fill: none;
      stroke: var(--ink);
      stroke-width: 0.4;
      opacity: 0.4;
    }

    .fill-in {
      animation: fillFadeIn 0.8s ease backwards;
    }

    @keyframes fillFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    /* Main Content Container */
    .main-content {
      position: relative;
      max-width: 900px;
      margin: 0 auto;
      padding: 12vh 8vw 15vh;
      text-align: center;
      opacity: 0;
      transform: translateY(20px);
      transition: all 1s ease-out 0.5s;
    }

    .main-content.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .label-small {
      font-size: 1.0rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--terracotta);
      margin-bottom: 1rem;
      display: block;
    }

    .eid-headline {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 8vw, 8rem);
      font-weight: 700;
      line-height: 0.9;
      margin-bottom: 2.5rem;
    }

    .eid-headline em {
      font-style: italic;
      font-weight: 400;
      color: var(--terracotta);
      display: block;
    }

    .signature-block {
      margin-bottom: 4rem;
    }

    .signature-name {
      font-family: 'Playfair Display', serif;
      font-style: italic;
      font-size: clamp(1.6rem, 2.5vw, 2.2rem);
      color: var(--ink);
    }

    .arabic-text {
      font-family: 'Noto Naskh Arabic', serif;
      font-size: clamp(1.4rem, 2.5vw, 2.2rem);
      color: var(--lapis);
      direction: rtl;
      line-height: 1.8;
      margin: 4rem 0 2rem;
      min-height: 2em;
    }

    .english-text {
      font-size: clamp(1.1rem, 1.4vw, 1.35rem);
      line-height: 2;
      color: rgba(26, 20, 16, 0.82);
      max-width: 52ch;
      margin: 0 auto;
      min-height: 9em;
    }

    .footer-stamp {
      margin-top: 8rem;
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: rgba(26, 20, 16, 0.4);
    }

    /* Ornaments */
    .hr-ornament {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      margin: 3rem 0;
    }

    .hr-line {
      width: 100px;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--terracotta), transparent);
    }

    .hr-diamond {
      width: 8px;
      height: 8px;
      background: var(--terracotta);
      transform: rotate(45deg);
    }

    .caret {
      display: inline-block;
      width: 2.5px;
      height: 1.2em;
      background: var(--terracotta);
      margin-left: 2px;
      animation: blink 0.8s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    /* Mobile Adaptations */
    @media (max-width: 700px) {
      .shamsa-anchor.in-corner {
        top: 1rem;
        right: 1.5rem;
        transform: translate(0, 0) scale(0.18);
      }

      .main-content {
        padding-top: 15vh;
      }

      .eid-headline {
        margin-bottom: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <!-- LOADING / CINEMATIC SHAMSA -->
  <div class="shamsa-anchor" id="shamsaAnchor">
    <svg class="geo-svg" id="geoSvg" viewBox="0 0 480 480">
      <defs>
        <clipPath id="circle-clip">
          <circle cx="240" cy="240" r="220" />
        </clipPath>
        <polygon id="kite-shape" points="0,-195 -38,-145 0,-115 38,-145" />
        <polygon id="petal-shape" points="0,-115 -25,-85 0,-40 25,-85" />
      </defs>
      <circle cx="240" cy="240" r="222" fill="#fcfbf9" stroke="#1a1410" stroke-width="0.5" />
      <g id="fills-layer" clip-path="url(#circle-clip)"></g>
      <g id="lines-layer" clip-path="url(#circle-clip)"></g>
      <circle cx="240" cy="240" r="15" class="ink-line" />
    </svg>
  </div>

  <!-- MAIN CARD FLOW -->
  <main class="main-content" id="mainContent">
    <span class="label-small">Eid Al-Fitr 1446 AH</span>

    <h1 class="eid-headline">
      Eid<br>
      <em>Mubarak</em>
    </h1>

    <div class="signature-block">
      <div class="signature-name">Arsalan Riaz</div>
    </div>

    <div class="hr-ornament">
      <div class="hr-line"></div>
      <div class="hr-diamond"></div>
      <div class="hr-line"></div>
    </div>

    <p class="arabic-text" id="arabicText"></p>
    <p class="english-text" id="englishText"></p>

    <div class="footer-stamp">
      _______________________
    </div>
  </main>

  <script>
    // ══════════════════════════════════════════════════════════
    // MATHEMATICALLY PRECISE SHAMSA ENGINE
    // ══════════════════════════════════════════════════════════
    (function initShamsa() {
      const fills = document.getElementById('fills-layer');
      const lines = document.getElementById('lines-layer');
      const CX = 240, CY = 240;

      function svgEl(tag, attrs) {
        const el = document.createElementNS("http://www.w3.org/2000/svg", tag);
        for (const [k, v] of Object.entries(attrs)) el.setAttribute(k, v);
        return el;
      }

      // 12 Outer Kites
      const colors = ['#c4622d', '#e8951a'];
      for (let i = 0; i < 12; i++) {
        const use = svgEl('use', {
          "href": "#kite-shape",
          "fill": colors[i % 2],
          "class": "fill-in",
          "style": `animation-delay: ${0.8 + i * 0.1}s`,
          "transform": `translate(${CX},${CY}) rotate(${i * 30})`
        });
        fills.appendChild(use);
      }

      // 12 Emerald Petals
      for (let i = 0; i < 12; i++) {
        const use = svgEl('use', {
          "href": "#petal-shape",
          "fill": "#1a6b4a",
          "class": "fill-in",
          "style": `animation-delay: ${2.0 + i * 0.08}s`,
          "transform": `translate(${CX},${CY}) rotate(${i * 30})`
        });
        fills.appendChild(use);
      }

      // Structural Outline (12-pointed star)
      const pts = [];
      for (let i = 0; i < 24; i++) {
        const r = (i % 2 === 0) ? 195 : 145;
        const a = (i * 15 - 90) * Math.PI / 180;
        pts.push(`${CX + r * Math.cos(a)},${CY + r * Math.sin(a)}`);
      }
      const star = svgEl('polygon', {
        "points": pts.join(' '),
        "stroke": "#1a1410",
        "stroke-width": "0.8",
        "fill": "none",
        "style": "animation: fillFadeIn 1s ease 0.5s backwards"
      });
      lines.appendChild(star);

      // Circles
      [210, 180, 115, 80].forEach((r, idx) => {
        lines.appendChild(svgEl('circle', {
          cx: CX, cy: CY, r: r,
          class: "ink-thin",
          style: `animation: fillFadeIn 1s ease ${idx * 0.2 + 0.3}s backwards`
        }));
      });
    })();

    // ══════════════════════════════════════════════════════════
    // CINEMATIC SEQUENCER
    // ══════════════════════════════════════════════════════════
    const sleep = ms => new Promise(r => setTimeout(r, ms));

    async function typeWriter(id, text, delay = 35) {
      const el = document.getElementById(id);
      el.innerHTML = '';
      const caret = document.createElement('span');
      caret.className = 'caret';
      el.appendChild(caret);

      for (const char of text) {
        const node = document.createTextNode(char);
        el.insertBefore(node, caret);
        await sleep(delay);
      }
      caret.remove();
    }

    window.onload = async () => {
      // 1. Initial State: Shamsa Drawing (Full Center)
      // Play time for shamsa: approx 4.5 seconds

      await sleep(4500);

      // 2. Transition State: Shamsa to Corner & Text Visible
      const anchor = document.getElementById('shamsaAnchor');
      const content = document.getElementById('mainContent');

      anchor.classList.add('in-corner');
      content.classList.add('visible');

      await sleep(1200);

      // 3. Typewriting Sequence
      const arabicStr = 'تقبل الله منا ومنكم صالح الاعمال وكل عيد وأنتم والجميع بخير';
      const englishStr = 'May Allah continue blessing us as in Ramadan, keep our hearts firm in faith, and give us strength to resist worldly distractions. May He purify our intentions, accept our acts of worship, and unite the Ummah of the Prophet ﷺ with success here and in the Hereafter. Ameen.';

      await typeWriter('arabicText', arabicStr, 50);
      await sleep(500);
      await typeWriter('englishText', englishStr, 25);
    };
  </script>
</body>

</html>
